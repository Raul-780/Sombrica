<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Sombrica</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;font-family:Arial,sans-serif}
canvas{display:block;position:fixed;top:0;left:0}
#hud{position:fixed;bottom:0;left:0;right:0;padding:14px 24px 44px;
  background:linear-gradient(transparent,rgba(0,0,0,.6));z-index:10;pointer-events:none}
#hud>*{pointer-events:auto}
#clock{text-align:center;color:#fff;font-size:34px;font-weight:700;letter-spacing:6px;
  text-shadow:0 2px 14px rgba(0,0,0,.95);margin-bottom:16px;cursor:pointer;
  font-variant-numeric:tabular-nums;user-select:none;-webkit-user-select:none}
#rng{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;
  background:rgba(255,255,255,.3);outline:none;cursor:pointer}
#rng::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;
  border-radius:50%;background:#fff;box-shadow:0 2px 14px rgba(0,0,0,.6);cursor:pointer}
#status{position:fixed;top:16px;left:16px;color:rgba(255,255,255,.92);font-size:11px;
  text-shadow:0 1px 6px rgba(0,0,0,.9);z-index:10;line-height:1.9;pointer-events:none}
#hint{position:fixed;bottom:112px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.45);font-size:10px;z-index:10;pointer-events:none;
  opacity:0;transition:opacity .6s;white-space:nowrap}
</style>
</head>
<body>
<div id="status">📍 Iniciando…</div>
<div id="hud">
  <div id="clock">--:--</div>
  <input type="range" id="rng" min="0" max="1439" step="1">
</div>
<div id="hint">Toca la hora para volver al presente</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
const DEG=Math.PI/180;
let lat=40.4168,lon=-3.7038,compassH=0,smoothH=0,lastDrag=0;

const rng=document.getElementById('rng');
const clockEl=document.getElementById('clock');
const statusEl=document.getElementById('status');
const hint=document.getElementById('hint');
const _n=new Date();
rng.value=_n.getHours()*60+_n.getMinutes();

// ── Renderer ──────────────────────────────────────────────────
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.NoToneMapping;
document.body.appendChild(renderer.domElement);

// ── Escena ────────────────────────────────────────────────────
const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x6FC3E8,40,160);

const FH=7.2;
function mkCam(){
  const a=innerWidth/innerHeight;
  const c=new THREE.OrthographicCamera(-FH*a,FH*a,FH,-FH,0.1,600);
  c.position.set(-14,11,-14);
  c.lookAt(0,1.0,0);
  return c;
}
const cam=mkCam();

const amb=new THREE.AmbientLight(0xffffff,0.26);scene.add(amb);

// sunPivot rota con la brújula → sombra gira sin mover la furgo
const sunPivot=new THREE.Group();scene.add(sunPivot);

const sun=new THREE.DirectionalLight(0xFFF8F0,0.80);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1;sun.shadow.camera.far=260;
sun.shadow.camera.left=sun.shadow.camera.bottom=-65;
sun.shadow.camera.right=sun.shadow.camera.top=65;
sun.shadow.bias=-0.0008;
sunPivot.add(sun);sunPivot.add(sun.target);

const world=new THREE.Group();scene.add(world);

const gndMat=new THREE.MeshLambertMaterial({color:0x7DB53A});
const gnd=new THREE.Mesh(new THREE.PlaneGeometry(220,220),gndMat);
gnd.rotation.x=-Math.PI/2;gnd.receiveShadow=true;
world.add(gnd);

// ══════════════════════════════════════════════════════════════
// FURGONETA V3D-1  —  van.rotation.y=-π/2 → morro apunta norte (-Z mundo)
// ══════════════════════════════════════════════════════════════
const NAVY=0x001F3F,TERRA=0xD2691E,WIN=0x8FB5C4,
      INK=0x060606,AMBER=0xFFBF00,RED=0xFF4136,
      CHROME=0xB0B0B0,DARK=0x111111;

// Gradiente toon 3 pasos
const gCv=document.createElement('canvas');gCv.width=256;gCv.height=1;
const gX=gCv.getContext('2d');
gX.fillStyle='#242424';gX.fillRect(0,0,88,1);
gX.fillStyle='#828282';gX.fillRect(88,0,78,1);
gX.fillStyle='#ffffff';gX.fillRect(166,0,90,1);
const gMap=new THREE.CanvasTexture(gCv);
gMap.minFilter=gMap.magFilter=THREE.NearestFilter;

const OL=new THREE.MeshBasicMaterial({color:INK,side:THREE.BackSide});
const van=new THREE.Group();
van.rotation.y=-Math.PI/2;
world.add(van);

function tmat(col,pOff=0){
  const m=new THREE.MeshToonMaterial({color:col,gradientMap:gMap});
  if(pOff){m.polygonOffset=true;m.polygonOffsetFactor=-pOff;m.polygonOffsetUnits=-pOff;}
  return m;
}
function bx(w,h,d,col,x,y,z,pOff=0,oSc=1.055){
  const g=new THREE.BoxGeometry(w,h,d);
  const m=new THREE.Mesh(g,tmat(col,pOff));
  m.position.set(x,y,z);m.castShadow=true;m.receiveShadow=true;
  if(oSc>0){const o=new THREE.Mesh(g,OL);o.scale.setScalar(oSc);m.add(o);}
  van.add(m);return m;
}

const VL=4.0,VW=1.60,VH=2.0;
const VY0=0.52,VYM=VY0+VH/2,VYT=VY0+VH;
const VFX=-VL/2,VBX=VL/2,VSZ=VW/2;
const wsBot=VY0+0.60,wsTop=VYT-0.18;
const wsH=wsTop-wsBot,apW=0.22,wsW=VW-2*apW;

// Cuerpo
bx(VL,VH,VW,NAVY,0,VYM,0);
// Cara frontal terracota + parabrisas
bx(0.024,wsBot-VY0,VW,   TERRA,VFX,(VY0+wsBot)/2,      0,1);
bx(0.024,VYT-wsTop,VW,   TERRA,VFX,(wsTop+VYT)/2,      0,1);
bx(0.022,wsH,apW,  TERRA,VFX,(wsBot+wsTop)/2,-(VSZ-apW/2),1.5,0);
bx(0.022,wsH,apW,  TERRA,VFX,(wsBot+wsTop)/2, (VSZ-apW/2),1.5,0);
bx(0.018,wsH,wsW,  WIN,  VFX-0.006,(wsBot+wsTop)/2,0,2,1.03);
// Faros
[-0.50,0.50].forEach(z=>{
  bx(0.048,0.24,0.34,WIN,  VFX-0.028,VY0+0.42,z,3);
  bx(0.052,0.18,0.27,AMBER,VFX-0.032,VY0+0.42,z,4,0);
});
// Parrilla
bx(0.042,0.32,0.78,TERRA,VFX-0.028,VY0+0.20,0,3);
for(let i=0;i<3;i++)bx(0.052,0.07,0.72,INK,VFX-0.034,VY0+0.06+i*0.09,0,5,0);
bx(0.052,0.11,0.11,AMBER,VFX-0.034,VY0+0.31,0,6,1.04);
// Parachoques
bx(0.26,0.22,VW+0.16,NAVY,VFX-0.15,VY0-0.09,0);
bx(0.26,0.22,VW+0.16,NAVY,VBX+0.15,VY0-0.09,0);
// Luces traseras
[-1,1].forEach(s=>{const z=s*(VSZ-0.17);
  bx(0.046,0.30,0.36,WIN,  VBX+0.026,VYT-0.28,z,2);
  bx(0.050,0.24,0.28,RED,  VBX+0.032,VYT-0.26,z,3);
  bx(0.050,0.11,0.27,AMBER,VBX+0.032,VYT-0.53,z,3);
});
// Matrícula
bx(0.034,0.24,0.60,TERRA,VBX+0.024,VYM-0.38,0,2,1.04);
// Portabicicletas
const brX=VBX+0.18;
bx(0.068,0.068,VW*0.82,TERRA,brX,VY0+1.22,0);
bx(0.068,0.068,VW*0.82,TERRA,brX,VY0+0.46,0);
[-0.33,0.33].forEach(z=>{
  bx(0.068,0.80,0.068,TERRA,brX,VY0+0.84,z);
  bx(0.22,0.068,0.068,TERRA,brX,VY0+0.56,z);
});
// Panel lateral
bx(VL+0.06,0.025,0.032,0x0A1220,0,VY0+0.44,VSZ+0.018,4,0);
// Puerta corredera
bx(1.65,VH*0.94,0.044,TERRA,-0.18,VYM+0.01,VSZ+0.026,1);
bx(0.80,0.48,0.050,WIN,-0.18,VYM+0.30,VSZ+0.054,2,1.03);
bx(0.042,0.32,0.054,NAVY,0.50,VYM+0.06,VSZ+0.064,3,0);
// Ventanas laterales izq
bx(0.54,0.44,0.044,WIN,VFX+0.56,VYM+0.33,VSZ+0.026,2,1.03);
bx(0.56,0.44,0.044,WIN,1.20,VYM+0.33,VSZ+0.026,2,1.03);
// Lateral derecho: toldo
{const g=new THREE.CylinderGeometry(0.13,0.13,3.50,14);
  const m=new THREE.Mesh(g,tmat(TERRA));
  m.rotation.z=Math.PI/2;m.position.set(-0.06,VYT+0.01,-(VSZ+0.145));
  m.castShadow=true;const o=new THREE.Mesh(g,OL);o.scale.setScalar(1.08);m.add(o);van.add(m);
  [-1.78,1.78].forEach(dx=>{
    const gc=new THREE.CylinderGeometry(0.135,0.135,0.04,14);
    const mc=new THREE.Mesh(gc,tmat(CHROME));
    mc.rotation.z=Math.PI/2;mc.position.set(-0.06+dx,VYT+0.01,-(VSZ+0.145));van.add(mc);
  });
}
bx(0.74,0.50,0.036,TERRA,0.50,VYM+0.30,-(VSZ+0.018),1.5,0);
bx(0.62,0.40,0.046,WIN,0.50,VYM+0.30,-(VSZ+0.030),2,1.03);
bx(0.50,0.38,0.046,TERRA,1.42,VYM-0.30,-(VSZ+0.028),2);
[-0.12,0.12].forEach(dx=>bx(0.034,0.12,0.12,CHROME,1.42+dx,VYM-0.30,-(VSZ+0.056),4,0));
// Techo
bx(VL,0.052,VW,NAVY,0,VYT+0.028,0);
// Caja de techo (reducida)
bx(0.90,0.22,1.00,TERRA,1.12,VYT+0.138,0);
// Panel solar marco + células canvas
bx(1.20,0.046,0.92,TERRA,-0.22,VYT+0.046,0);
{const sc=document.createElement('canvas');sc.width=240;sc.height=180;
  const sx=sc.getContext('2d');
  sx.fillStyle='#0074D9';sx.fillRect(0,0,240,180);
  sx.strokeStyle='#004A8F';sx.lineWidth=3;
  for(let xi=0;xi<=240;xi+=60){sx.beginPath();sx.moveTo(xi,0);sx.lineTo(xi,180);sx.stroke();}
  for(let yi=0;yi<=180;yi+=45){sx.beginPath();sx.moveTo(0,yi);sx.lineTo(240,yi);sx.stroke();}
  const sm=new THREE.Mesh(new THREE.BoxGeometry(1.10,0.050,0.84),
    new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(sc)}));
  sm.position.set(-0.22,VYT+0.054,0);van.add(sm);
}
// Claraboya
bx(0.58,0.048,0.46,TERRA,-1.14,VYT+0.048,-0.22);
bx(0.50,0.12,0.38,WIN,-1.14,VYT+0.100,-0.22,0,1.03);
// Ruedas
[[-1.20,-1],[-1.20,1],[1.14,-1],[1.14,1]].forEach(([ax,side])=>{
  const z=side*(VSZ+0.04);
  const tg=new THREE.CylinderGeometry(0.33,0.33,0.22,24);
  const tw=new THREE.Mesh(tg,new THREE.MeshToonMaterial({color:DARK,gradientMap:gMap}));
  tw.position.set(ax,0.35,z);tw.rotation.x=Math.PI/2;tw.castShadow=true;
  const to=new THREE.Mesh(tg,OL);to.scale.setScalar(1.07);tw.add(to);
  van.add(tw);
  const rg=new THREE.CylinderGeometry(0.21,0.21,0.24,16);
  const rw=new THREE.Mesh(rg,new THREE.MeshToonMaterial({color:TERRA,gradientMap:gMap}));
  rw.position.set(ax,0.35,z);rw.rotation.x=Math.PI/2;rw.castShadow=true;
  const ro=new THREE.Mesh(rg,OL);ro.scale.setScalar(1.06);rw.add(ro);
  van.add(rw);
  const hw=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,0.26,10),
    new THREE.MeshToonMaterial({color:CHROME,gradientMap:gMap}));
  hw.position.set(ax,0.35,z);hw.rotation.x=Math.PI/2;van.add(hw);
  bx(0.62,0.17,0.32,NAVY,ax,0.73,z,0,1.05);
});

// ══════════════════════════════════════════════════════════════
// POSICIÓN SOLAR (NOAA)
// ══════════════════════════════════════════════════════════════
function getSolar(la,lo,mins){
  const d=new Date();d.setHours(Math.floor(mins/60),mins%60,0,0);
  const JD=d.getTime()/86400000+2440587.5;
  const T=(JD-2451545)/36525;
  let L0=(280.46646+T*(36000.76983+0.0003032*T))%360;if(L0<0)L0+=360;
  let M=(357.52911+T*(35999.05029-0.0001537*T))%360;if(M<0)M+=360;
  const Mr=M*DEG;
  const C=(1.914602-T*(0.004817+0.000014*T))*Math.sin(Mr)
         +(0.019993-0.000101*T)*Math.sin(2*Mr)+0.000289*Math.sin(3*Mr);
  const om=125.04-1934.136*T;
  const lam=L0+C-0.00569-0.00478*Math.sin(om*DEG);
  const eps=(23.439291-T*(0.013004+T*1.64e-7)+0.00256*Math.cos(om*DEG))*DEG;
  const dec=Math.asin(Math.sin(eps)*Math.sin(lam*DEG));
  const y2=Math.tan(eps/2)**2,e=0.016708634,L0r=L0*DEG;
  const EqT=4/DEG*(y2*Math.sin(2*L0r)-2*e*Math.sin(Mr)
    +4*e*y2*Math.sin(Mr)*Math.cos(2*L0r)
    -0.5*y2*y2*Math.sin(4*L0r)-1.25*e*e*Math.sin(2*Mr));
  const utcM=(d.getUTCHours()*60+d.getUTCMinutes()+1440)%1440;
  const TST=(utcM+4*lo+EqT+1440)%1440;
  const HA=TST/4-180,HAr=HA*DEG,lar=la*DEG;
  const sA=Math.sin(lar)*Math.sin(dec)+Math.cos(lar)*Math.cos(dec)*Math.cos(HAr);
  const alt=Math.asin(Math.max(-1,Math.min(1,sA)));
  const cAz=(Math.sin(dec)-Math.sin(alt)*Math.sin(lar))/(Math.cos(alt)*Math.cos(lar)+1e-9);
  let az=Math.acos(Math.max(-1,Math.min(1,cAz)));if(HA>0)az=Math.PI*2-az;
  return{alt:alt/DEG,az:az/DEG};
}

const cl=(a,b,t)=>a+(b-a)*Math.max(0,Math.min(1,t));
const lC=(a,b,t)=>new THREE.Color(a).lerp(new THREE.Color(b),Math.max(0,Math.min(1,t)));

function update(mins){
  const{alt,az}=getSolar(lat,lon,mins);
  const azR=az*DEG,eR=Math.max(alt,2)*DEG,D=78;
  sun.position.set(Math.sin(azR)*Math.cos(eR)*D,Math.sin(eR)*D,-Math.cos(azR)*Math.cos(eR)*D);
  sun.target.position.set(0,0,0);

  let ambI,sunI,sR,sG,sB,skyHex,fogH,gndH;
  if(alt>=18){
    ambI=0.26;sunI=0.80;sR=1;sG=0.97;sB=0.92;
    skyHex=0x4AA8D4;fogH=0x7DBFE0;gndH=0x7DB53A;
  } else if(alt>=0){
    const t=alt/18;
    ambI=cl(0.09,0.26,t);sunI=cl(0.14,0.80,t);sR=1;sG=cl(0.40,0.97,t);sB=cl(0.06,0.92,t);
    skyHex=lC(0xE56A18,0x4AA8D4,t).getHex();
    fogH=lC(0xDDA040,0x7DBFE0,t).getHex();
    gndH=lC(0x182808,0x7DB53A,t).getHex();
  } else if(alt>=-8){
    const t=(alt+8)/8;
    ambI=cl(0.04,0.09,t);sunI=0;sR=1;sG=0.40;sB=0.08;
    skyHex=lC(0x05050E,0xE56A18,t).getHex();
    fogH=0x060710;gndH=0x182808;
  } else {
    ambI=0.04;sunI=0;sR=1;sG=0.35;sB=0.08;
    skyHex=0x030310;fogH=0x04040A;gndH=0x152208;
  }
  amb.intensity=ambI;sun.intensity=sunI;sun.color.setRGB(sR,sG,sB);
  renderer.setClearColor(skyHex);
  scene.fog.color.setHex(fogH);
  gndMat.color.setHex(gndH);
  clockEl.textContent=`${String(Math.floor(mins/60)).padStart(2,'0')}:${String(mins%60).padStart(2,'0')}`;
}

// ── GPS ───────────────────────────────────────────────────────
if(navigator.geolocation){
  navigator.geolocation.watchPosition(
    p=>{lat=p.coords.latitude;lon=p.coords.longitude;
      statusEl.textContent=`📍 ${lat.toFixed(3)}°, ${lon.toFixed(3)}°`;
      setTimeout(()=>statusEl.style.opacity='0',5000);
      update(+rng.value);},
    ()=>{statusEl.textContent='📍 Madrid (sin GPS)';statusEl.style.opacity='0.6';},
    {enableHighAccuracy:true,timeout:15000});
}else{statusEl.textContent='📍 Madrid (sin GPS)';statusEl.style.opacity='0.6';}

// ── Render loop ───────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  smoothH=lerpAngle(smoothH,compassH*DEG,0.06);
  sunPivot.rotation.y=smoothH;   // sombra gira con el móvil
  nArrow.rotation.y=smoothH;     // flecha N apunta siempre al norte real
  renderer.render(scene,cam);
}
rng.addEventListener('pointerdown',()=>lastDrag=Date.now());
rng.addEventListener('input',()=>{lastDrag=Date.now();hint.style.opacity='1';update(+rng.value);});
clockEl.addEventListener('click',()=>{
  lastDrag=0;const n=new Date();
  rng.value=n.getHours()*60+n.getMinutes();hint.style.opacity='0';update(+rng.value);
});
setInterval(()=>{
  if(Date.now()-lastDrag>300000){
    const n=new Date();rng.value=n.getHours()*60+n.getMinutes();
    hint.style.opacity='0';update(+rng.value);
  }
},30000);

// ── Resize ────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  const a=innerWidth/innerHeight;
  cam.left=-FH*a;cam.right=FH*a;cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ── Render loop ───────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  renderer.render(scene,cam);
}
update(+rng.value);
loop();
</script>
</body>
</html>
