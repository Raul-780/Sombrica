<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Sombrica</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;font-family:Arial,sans-serif}
canvas{display:block;position:fixed;top:0;left:0}
#hud{position:fixed;bottom:0;left:0;right:0;padding:14px 24px 44px;
  background:linear-gradient(transparent,rgba(0,0,0,.6));z-index:10;pointer-events:none}
#hud>*{pointer-events:auto}
#clock{text-align:center;color:#fff;font-size:34px;font-weight:700;letter-spacing:6px;
  text-shadow:0 2px 14px rgba(0,0,0,.95);margin-bottom:16px;cursor:pointer;
  font-variant-numeric:tabular-nums;user-select:none;-webkit-user-select:none}
#rng{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;
  background:rgba(255,255,255,.3);outline:none;cursor:pointer}
#rng::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;
  border-radius:50%;background:#fff;box-shadow:0 2px 14px rgba(0,0,0,.6);cursor:pointer}
#status{position:fixed;top:16px;left:16px;color:rgba(255,255,255,.9);font-size:11px;
  text-shadow:0 1px 6px rgba(0,0,0,.9);z-index:10;line-height:1.9;pointer-events:none}
#cbtn{position:fixed;top:12px;right:12px;background:rgba(255,255,255,.13);
  border:1px solid rgba(255,255,255,.3);color:#fff;padding:9px 18px;border-radius:22px;
  font-size:12px;cursor:pointer;z-index:10;backdrop-filter:blur(8px)}
#cbtn.on{background:rgba(70,210,100,.22);border-color:rgba(70,210,100,.5)}
#hint{position:fixed;bottom:112px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.45);font-size:10px;z-index:10;pointer-events:none;
  opacity:0;transition:opacity .6s;white-space:nowrap}
</style>
</head>
<body>
<div id="status">📍 Obteniendo ubicación…</div>
<button id="cbtn">🧭 Brújula</button>
<div id="hud">
  <div id="clock">--:--</div>
  <input type="range" id="rng" min="0" max="1439" step="1">
</div>
<div id="hint">Toca la hora para volver al presente</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
const DEG=Math.PI/180;
let lat=40.4168,lon=-3.7038,compassH=0,compassOn=false,lastDrag=0;

const rng=document.getElementById('rng');
const clockEl=document.getElementById('clock');
const statusEl=document.getElementById('status');
const cbtn=document.getElementById('cbtn');
const hint=document.getElementById('hint');
const _n=new Date();rng.value=_n.getHours()*60+_n.getMinutes();

// ── Renderer ──────────────────────────────────────────────────
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.autoClear=false;
renderer.toneMapping=THREE.NoToneMapping;
document.body.appendChild(renderer.domElement);

// ══════════════════════════════════════════════════════════════
// SKY SCENE (no fog — stars always visible)
// ══════════════════════════════════════════════════════════════
const skyScene=new THREE.Scene();
const skyCam=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,3000);

// Sky dome with vertex colours
const skyGeo=new THREE.SphereGeometry(1200,32,20);
const skyDome=new THREE.Mesh(skyGeo,
  new THREE.MeshBasicMaterial({side:THREE.BackSide,vertexColors:true}));
skyScene.add(skyDome);

function buildSky(topH,midH,botH){
  const geo=skyDome.geometry,pos=geo.attributes.position;
  const n=pos.count,c=new Float32Array(n*3);
  const cT=new THREE.Color(topH),cM=new THREE.Color(midH),cB=new THREE.Color(botH);
  for(let i=0;i<n;i++){
    const y=Math.max(-1,Math.min(1,pos.getY(i)/1200));
    const col=y>=0?cM.clone().lerp(cT,y):cM.clone().lerp(cB,-y);
    c[i*3]=col.r;c[i*3+1]=col.g;c[i*3+2]=col.b;
  }
  geo.setAttribute('color',new THREE.BufferAttribute(c,3));
  geo.attributes.color.needsUpdate=true;
}

// Stars — hemisphere, varied sizes
const starN=1800,sPos=new Float32Array(starN*3),sSz=new Float32Array(starN);
for(let i=0;i<starN;i++){
  const th=Math.random()*Math.PI*2,ph=Math.random()*Math.PI*0.50,r=1000;
  sPos[i*3  ]=r*Math.sin(ph)*Math.cos(th);
  sPos[i*3+1]=r*Math.cos(ph)+40;
  sPos[i*3+2]=r*Math.sin(ph)*Math.sin(th);
  sSz[i]=2.0+Math.random()*5.0;
}
const starGeo=new THREE.BufferGeometry();
starGeo.setAttribute('position',new THREE.BufferAttribute(sPos,3));
starGeo.setAttribute('size',new THREE.BufferAttribute(sSz,1));
// Use ShaderMaterial so each star has its own size
const starMat=new THREE.ShaderMaterial({
  uniforms:{opacity:{value:0},baseColor:{value:new THREE.Color(0xEEEEFF)}},
  vertexShader:`
    attribute float size;
    void main(){
      gl_PointSize=size;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
    }`,
  fragmentShader:`
    uniform float opacity;
    uniform vec3 baseColor;
    void main(){
      vec2 uv=gl_PointCoord-0.5;
      float r=length(uv);
      if(r>0.5)discard;
      float a=smoothstep(0.5,0.2,r)*opacity;
      gl_FragColor=vec4(baseColor,a);
    }`,
  transparent:true,depthWrite:false
});
skyScene.add(new THREE.Points(starGeo,starMat));

// Moon crescent
const mCv=document.createElement('canvas');mCv.width=mCv.height=128;
const mX=mCv.getContext('2d');
mX.beginPath();mX.arc(64,64,56,0,Math.PI*2);mX.fillStyle='#FFF6DC';mX.fill();
mX.beginPath();mX.arc(86,52,44,0,Math.PI*2);mX.fillStyle='#010108';mX.fill();
const moonSp=new THREE.Sprite(new THREE.SpriteMaterial(
  {map:new THREE.CanvasTexture(mCv),transparent:true,opacity:0,depthWrite:false}));
moonSp.scale.set(80,80,1);moonSp.position.set(-500,350,-900);
skyScene.add(moonSp);

// ══════════════════════════════════════════════════════════════
// MAIN SCENE
// ══════════════════════════════════════════════════════════════
const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x6FC3E8,35,140);

// Orthographic camera — slightly lower angle so horizon is visible
const FH=7.2;
function mkCam(){
  const a=innerWidth/innerHeight;
  const c=new THREE.OrthographicCamera(-FH*a,FH*a,FH,-FH,0.1,600);
  // Position: left-rear-high → furgo morro (−Z) points north in scene
  // Camera looks from right-front so we see front face + left side + top
  c.position.set(14,11,14);
  c.lookAt(0,0.8,0);
  return c;
}
const cam=mkCam();

// Lights
const amb=new THREE.AmbientLight(0xffffff,0.26);scene.add(amb);
const sun=new THREE.DirectionalLight(0xFFF8F0,0.80);
sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1;sun.shadow.camera.far=250;
[-55,55].forEach(v=>{sun.shadow.camera.left=sun.shadow.camera.bottom=-55;
  sun.shadow.camera.right=sun.shadow.camera.top=55;});
sun.shadow.bias=-0.0008;
scene.add(sun,sun.target);

// World group (rotates with compass)
const world=new THREE.Group();scene.add(world);

// Ground
const gndMat=new THREE.MeshLambertMaterial({color:0x7DB53A});
const gnd=new THREE.Mesh(new THREE.PlaneGeometry(200,200),gndMat);
gnd.rotation.x=-Math.PI/2;gnd.receiveShadow=true;world.add(gnd);

// Horizon ring — thin torus flat on ground at far edge, picks up fog naturally
const horizRing=new THREE.Mesh(
  new THREE.TorusGeometry(55,0.18,4,80),
  new THREE.MeshBasicMaterial({color:0x4a8a20,transparent:true,opacity:0.55})
);
horizRing.rotation.x=Math.PI/2;horizRing.position.y=0.04;
world.add(horizRing);

// ══════════════════════════════════════════════════════════════
// NORTH ARROW — painted on ground, points −Z (north in scene)
// Furgo morro also points −Z so they align
// ══════════════════════════════════════════════════════════════
{
  const cv=document.createElement('canvas');cv.width=512;cv.height=160;
  const cx=cv.getContext('2d');
  // Arrow pointing in +X of canvas → will be rotated so it points −Z in world
  cx.fillStyle='rgba(0,0,0,0)';cx.fillRect(0,0,512,160);
  cx.shadowColor='rgba(0,0,0,0.5)';cx.shadowBlur=6;
  cx.fillStyle='#DD1F1F';
  cx.fillRect(30,62,305,36);
  cx.beginPath();cx.moveTo(335,8);cx.lineTo(492,80);cx.lineTo(335,152);cx.closePath();cx.fill();
  cx.shadowBlur=0;
  cx.font='bold 72px Arial';cx.fillStyle='#fff';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('N',430,80);

  const mesh=new THREE.Mesh(
    new THREE.PlaneGeometry(5.5,1.72),
    new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(cv),
      transparent:true,alphaTest:0.05,depthWrite:false})
  );
  // Flat on ground, arrow tip points toward -Z (north)
  mesh.rotation.x=-Math.PI/2;
  // Default PlaneGeometry +X → rotate so canvas +X points to scene −Z
  mesh.rotation.z=Math.PI/2;   // now arrow points −Z
  mesh.position.set(0,0.022,-3.8);   // just in front of morro
  world.add(mesh);
}

// ══════════════════════════════════════════════════════════════
// CEL-SHADED CAMPER VAN  — morro points −Z (north)
// ══════════════════════════════════════════════════════════════
const van=new THREE.Group();
// Rotate van 90° so original −X front → now −Z front (north)
van.rotation.y=Math.PI/2;
world.add(van);

// Toon gradient
const gCv=document.createElement('canvas');gCv.width=256;gCv.height=1;
const gX=gCv.getContext('2d');
gX.fillStyle='#3a3a3a';gX.fillRect(0,0,96,1);
gX.fillStyle='#909090';gX.fillRect(96,0,72,1);
gX.fillStyle='#ffffff';gX.fillRect(168,0,88,1);
const gMap=new THREE.CanvasTexture(gCv);
gMap.minFilter=gMap.magFilter=THREE.NearestFilter;

const NAVY=0x1B2A4A,TERRA=0xB05228,WIN=0x8FB5C4,
      INK=0x080808,AMBER=0xFFBC30,RED=0xBB1000,CHROME=0x888888;
const OL=new THREE.MeshBasicMaterial({color:INK,side:THREE.BackSide});

function tm(col){return new THREE.MeshToonMaterial({color:col,gradientMap:gMap});}
function bx(w,h,d,col,x,y,z,polyOff=0,outScale=1.07){
  const g=new THREE.BoxGeometry(w,h,d);
  const m=new THREE.Mesh(g,Object.assign(tm(col),
    polyOff?{polygonOffset:true,polygonOffsetFactor:-polyOff,polygonOffsetUnits:-polyOff}:{}));
  m.position.set(x,y,z);m.castShadow=true;m.receiveShadow=true;
  if(outScale>0){const o=new THREE.Mesh(g,OL);o.scale.setScalar(outScale);m.add(o);}
  van.add(m);return m;
}
function cy(r,h,s,col,x,y,z,outScale=1.08){
  const g=new THREE.CylinderGeometry(r,r,h,s);
  const m=new THREE.Mesh(g,tm(col));
  m.position.set(x,y,z);m.rotation.x=Math.PI/2;m.castShadow=true;
  if(outScale>0){const o=new THREE.Mesh(g,OL);o.scale.setScalar(outScale);m.add(o);}
  van.add(m);return m;
}

const VL=3.76,VH=1.60,VW=1.28;
const VY0=0.52,VYM=VY0+VH/2,VYT=VY0+VH;
const VFX=-VL/2,VSZ=VW/2;
const apW=(VW-0.88)/2,apZc=VSZ-apW/2;
const wsBot=VYM+0.24-0.28,wsTop=VYM+0.24+0.28;

// Main body
bx(VL,VH,VW,NAVY,0,VYM,0);
// Front face
bx(0.018,wsBot-VY0,VW,TERRA,VFX,(VY0+wsBot)/2,0,1);
bx(0.018,wsTop-wsBot,apW,TERRA,VFX,VYM+0.24,-apZc,1.5);
bx(0.018,wsTop-wsBot,apW,TERRA,VFX,VYM+0.24, apZc,1.5);
bx(0.018,wsTop-wsBot,0.88,WIN,VFX-0.005,VYM+0.24,0,2,1.04);
bx(0.018,VYT-wsTop,VW,TERRA,VFX,(wsTop+VYT)/2,0,1);
// Headlights
bx(0.07,0.14,0.20,AMBER,VFX-0.04,VYM+0.12,-0.42);
bx(0.07,0.14,0.20,AMBER,VFX-0.04,VYM+0.12, 0.42);
// Grille
bx(0.06,0.24,0.66,TERRA,VFX-0.04,VY0+0.15,0,3);
for(let i=0;i<3;i++)bx(0.065,0.04,0.60,INK,VFX-0.045,VY0+0.06+i*0.09,0,5,0);
bx(0.06,0.09,0.09,AMBER,VFX-0.045,VY0+0.24,0,6,1.05);
// Bumpers
bx(0.10,0.16,VW*1.06,NAVY,VFX-0.09,VY0-0.02,0);
bx(0.10,0.16,VW*1.06,NAVY,-VFX+0.09,VY0-0.02,0);
// Rear lights
bx(0.055,0.22,0.18,RED,-VFX+0.04,VYM+0.14,-0.44);
bx(0.055,0.22,0.18,RED,-VFX+0.04,VYM+0.14, 0.44);
// Panel line
bx(VL+0.06,0.025,0.032,0x0A1220,0,VY0+0.44,VSZ+0.018,4,0);
// Sliding door
bx(1.40,VH*0.95,0.055,TERRA,-0.30,VYM-0.01,VSZ+0.028);
bx(0.042,0.30,0.07,NAVY,-0.30,VYM+0.06,VSZ+0.065,3,0);
// Windows
bx(0.48,0.35,0.06,WIN,-1.42,VYM+0.27,VSZ+0.07,2,1.04);
bx(0.60,0.38,0.06,WIN,-0.60,VYM+0.30,VSZ+0.07,2,1.04);
bx(0.54,0.38,0.06,WIN, 0.44,VYM+0.30,VSZ+0.065,2,1.04);
bx(0.46,0.38,0.06,WIN, 1.22,VYM+0.30,VSZ+0.065,2,1.04);
// Roof
bx(VL,0.055,VW,NAVY,0,VYT+0.027,0);
bx(1.30,0.28,1.06,TERRA,0.95,VYT+0.168,0);
bx(1.06,0.045,0.76,TERRA,-0.28,VYT+0.052,0);
// Solar panel
{
  const sc=document.createElement('canvas');sc.width=210;sc.height=150;
  const sx=sc.getContext('2d');
  sx.fillStyle='#1A3580';sx.fillRect(0,0,210,150);
  sx.strokeStyle='#0A1A50';sx.lineWidth=2.5;
  for(let xi=0;xi<=210;xi+=42){sx.beginPath();sx.moveTo(xi,0);sx.lineTo(xi,150);sx.stroke();}
  for(let yi=0;yi<=150;yi+=30){sx.beginPath();sx.moveTo(0,yi);sx.lineTo(210,yi);sx.stroke();}
  const sm=new THREE.Mesh(new THREE.BoxGeometry(0.97,0.05,0.68),
    new THREE.MeshLambertMaterial({map:new THREE.CanvasTexture(sc)}));
  sm.position.set(-0.28,VYT+0.058,0);van.add(sm);
}
// Skylight
bx(0.52,0.052,0.40,NAVY,-1.12,VYT+0.052,-0.22);
bx(0.44,0.09,0.33,WIN,-1.12,VYT+0.090,-0.22,0,1.04);
// Wheels
[[-1.1,-0.67],[-1.1,0.67],[0.9,-0.67],[0.9,0.67]].forEach(([x,z])=>{
  cy(0.30,0.20,24,INK,x,0.30,z);
  cy(0.19,0.22,16,TERRA,x,0.30,z);
  cy(0.07,0.23,10,CHROME,x,0.30,z,0);
  bx(0.52,0.11,0.23,NAVY,x,0.60,z,0,1.06);
});

// ══════════════════════════════════════════════════════════════
// SOLAR POSITION (NOAA)
// ══════════════════════════════════════════════════════════════
function getSolar(la,lo,mins){
  const d=new Date();d.setHours(Math.floor(mins/60),mins%60,0,0);
  const JD=d.getTime()/86400000+2440587.5;
  const T=(JD-2451545)/36525;
  let L0=(280.46646+T*(36000.76983+0.0003032*T))%360;if(L0<0)L0+=360;
  let M=(357.52911+T*(35999.05029-0.0001537*T))%360;if(M<0)M+=360;
  const Mr=M*DEG;
  const C=(1.914602-T*(0.004817+0.000014*T))*Math.sin(Mr)
         +(0.019993-0.000101*T)*Math.sin(2*Mr)+0.000289*Math.sin(3*Mr);
  const om=125.04-1934.136*T;
  const lam=L0+C-0.00569-0.00478*Math.sin(om*DEG);
  const eps=(23.439291-T*(0.013004+T*1.64e-7)+0.00256*Math.cos(om*DEG))*DEG;
  const dec=Math.asin(Math.sin(eps)*Math.sin(lam*DEG));
  const y2=Math.tan(eps/2)**2,e=0.016708634,L0r=L0*DEG;
  const EqT=4/DEG*(y2*Math.sin(2*L0r)-2*e*Math.sin(Mr)
    +4*e*y2*Math.sin(Mr)*Math.cos(2*L0r)
    -0.5*y2*y2*Math.sin(4*L0r)-1.25*e*e*Math.sin(2*Mr));
  const utcM=(d.getUTCHours()*60+d.getUTCMinutes()+1440)%1440;
  const TST=(utcM+4*lo+EqT+1440)%1440;
  const HA=TST/4-180,HAr=HA*DEG,lar=la*DEG;
  const sA=Math.sin(lar)*Math.sin(dec)+Math.cos(lar)*Math.cos(dec)*Math.cos(HAr);
  const alt=Math.asin(Math.max(-1,Math.min(1,sA)));
  const cAz=(Math.sin(dec)-Math.sin(alt)*Math.sin(lar))/(Math.cos(alt)*Math.cos(lar)+1e-9);
  let az=Math.acos(Math.max(-1,Math.min(1,cAz)));if(HA>0)az=Math.PI*2-az;
  return{alt:alt/DEG,az:az/DEG};
}

const cl=(a,b,t)=>a+(b-a)*Math.max(0,Math.min(1,t));
const lC=(a,b,t)=>new THREE.Color(a).lerp(new THREE.Color(b),Math.max(0,Math.min(1,t)));

// ══════════════════════════════════════════════════════════════
// UPDATE
// ══════════════════════════════════════════════════════════════
function update(mins){
  const{alt,az}=getSolar(lat,lon,mins);
  const azR=az*DEG,eR=Math.max(alt,2)*DEG,D=75;
  sun.position.set(Math.sin(azR)*Math.cos(eR)*D,Math.sin(eR)*D,-Math.cos(azR)*Math.cos(eR)*D);
  sun.target.position.set(0,0,0);

  let ambI,sunI,sR,sG,sB,skyT,skyM,skyB,fogH,gndH,stOp=0,mnOp=0;
  if(alt>=18){
    ambI=0.26;sunI=0.80;sR=1;sG=0.97;sB=0.92;
    skyT=0x0D5A99;skyM=0x4AA8D4;skyB=0x80C8E8;
    fogH=0x7DBFE0;gndH=0x7DB53A;
  } else if(alt>=0){
    const t=alt/18;
    ambI=cl(0.09,0.26,t);sunI=cl(0.14,0.80,t);
    sR=1;sG=cl(0.40,0.97,t);sB=cl(0.06,0.92,t);
    skyT=lC(0xAA3A0E,0x0D5A99,t).getHex();
    skyM=lC(0xE56A18,0x4AA8D4,t).getHex();
    skyB=lC(0xFFCC80,0x80C8E8,t).getHex();
    fogH=lC(0xDDA040,0x7DBFE0,t).getHex();
    gndH=lC(0x182808,0x7DB53A,t).getHex();
  } else if(alt>=-8){
    const t=(alt+8)/8;
    ambI=cl(0.04,0.09,t);sunI=0;sR=1;sG=0.40;sB=0.08;
    skyT=lC(0x020208,0xAA3A0E,t).getHex();
    skyM=lC(0x05050E,0xE56A18,t).getHex();
    skyB=lC(0x08080F,0xFFCC80,t).getHex();
    fogH=0x060710;gndH=0x182808;
    stOp=cl(0,0.92,1-t);mnOp=cl(0,0.88,1-t);
  } else {
    ambI=0.04;sunI=0;sR=1;sG=0.35;sB=0.08;
    skyT=0x010107;skyM=0x030310;skyB=0x06060F;
    fogH=0x04040A;gndH=0x152208;stOp=0.94;mnOp=0.90;
  }

  amb.intensity=ambI;sun.intensity=sunI;sun.color.setRGB(sR,sG,sB);
  scene.fog.color.setHex(fogH);gndMat.color.setHex(gndH);
  buildSky(skyT,skyM,skyB);
  starMat.uniforms.opacity.value=stOp;
  moonSp.material.opacity=mnOp;
  clockEl.textContent=`${String(Math.floor(mins/60)).padStart(2,'0')}:${String(mins%60).padStart(2,'0')}`;
}

// ── GPS ───────────────────────────────────────────────────────
if(navigator.geolocation){
  navigator.geolocation.watchPosition(
    p=>{lat=p.coords.latitude;lon=p.coords.longitude;
      statusEl.textContent=`📍 ${lat.toFixed(4)}°, ${lon.toFixed(4)}°`;
      setTimeout(()=>statusEl.style.opacity='0',5000);update(+rng.value);},
    ()=>{statusEl.textContent='📍 Sin GPS — usando Madrid';statusEl.style.opacity='0.55';},
    {enableHighAccuracy:true,timeout:15000});
}else{statusEl.textContent='📍 Sin GPS — usando Madrid';statusEl.style.opacity='0.55';}

// ── Compass — toggle ON/OFF ───────────────────────────────────
function onOri(e){
  let h=null;
  if(e.webkitCompassHeading!=null)h=e.webkitCompassHeading;
  else if(e.absolute&&e.alpha!=null)h=(360-e.alpha+360)%360;
  if(h!=null)compassH=h;
}
function enableCompass(){
  window.addEventListener('deviceorientationabsolute',onOri,true);
  window.addEventListener('deviceorientation',onOri,true);
  compassOn=true;cbtn.textContent='🧭 Brújula ON';cbtn.classList.add('on');
}
function disableCompass(){
  window.removeEventListener('deviceorientationabsolute',onOri,true);
  window.removeEventListener('deviceorientation',onOri,true);
  compassOn=false;world.rotation.y=0;
  cbtn.textContent='🧭 Brújula';cbtn.classList.remove('on');
}
cbtn.addEventListener('click',()=>{
  if(compassOn){disableCompass();return;}
  if(typeof DeviceOrientationEvent!=='undefined'&&
     typeof DeviceOrientationEvent.requestPermission==='function')
    DeviceOrientationEvent.requestPermission().then(r=>{if(r==='granted')enableCompass();});
  else enableCompass();
});

// ── Slider & clock ────────────────────────────────────────────
rng.addEventListener('pointerdown',()=>lastDrag=Date.now());
rng.addEventListener('input',()=>{lastDrag=Date.now();hint.style.opacity='1';update(+rng.value);});
clockEl.addEventListener('click',()=>{
  lastDrag=0;const n=new Date();
  rng.value=n.getHours()*60+n.getMinutes();hint.style.opacity='0';update(+rng.value);
});
setInterval(()=>{
  if(Date.now()-lastDrag>300000){
    const n=new Date();rng.value=n.getHours()*60+n.getMinutes();
    hint.style.opacity='0';update(+rng.value);
  }
},30000);

// ── Resize ────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  const a=innerWidth/innerHeight;
  cam.left=-FH*a;cam.right=FH*a;cam.updateProjectionMatrix();
  skyCam.aspect=a;skyCam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ── Render loop ───────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  if(compassOn)world.rotation.y=compassH*DEG;
  skyCam.quaternion.copy(cam.quaternion);
  renderer.clear();
  renderer.render(skyScene,skyCam);
  renderer.clearDepth();
  renderer.render(scene,cam);
}
update(+rng.value);
loop();
</script>
</body>
</html>
